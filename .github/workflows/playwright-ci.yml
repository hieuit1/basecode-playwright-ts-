name: Core Automation CI Pipeline
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Chọn môi trường kiểm thử"
        required: true
        default: "qa"
        type: choice
        options: [dev, qa, staging]

jobs:
  execute-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          
      - name: Install System Dependencies
        run: npm ci
        
      - name: Deploy Managed Custom Browsers
        run: npx playwright install --with-deps

      - name: Execute Parallel Shard Testing
        env:
          ENV: ${{ github.event.inputs.environment || 'qa' }}
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Preserve Allure Context Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-chunk-${{ matrix.shardIndex }}
          path: allure-results
          retention-days: 1

  compile-and-publish-report:
    if: ${{ !cancelled() }}
    needs: [execute-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Merge Distributed Artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/allure-results   # Đã đổi đường dẫn để khớp với Action sinh báo cáo bên dưới
          pattern: allure-results-chunk-*
          merge-multiple: true

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 0

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          gh_pages: gh-pages-dir
          keep_reports: 20

      - name: Host Dashboard on GitHub Pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Publish Test Report Link
        if: github.event_name != 'pull_request'
        run: |
          echo "## 📊 KẾT QUẢ KIỂM THỬ PLAYWRIGHT" >> $GITHUB_STEP_SUMMARY
          echo "| Hạng mục | Thông tin chi tiết |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Môi trường** | \`${{ github.event.inputs.environment || 'qa' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Báo cáo Allure** | 👉 **[XEM BÁO CÁO TẠI ĐÂY](https://hieuit1.github.io/basecode-playwright-ts/)** |" >> $GITHUB_STEP_SUMMARY